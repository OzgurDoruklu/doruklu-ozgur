<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Özgür Doruklu - Kişisel Alan</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.doruklu.com/style.css">
</head>
<body>

    <div id="loading-spinner" class="loading-overlay"><div class="spinner"></div></div>

    <div id="dashboard-screen" class="screen" style="display: flex;">
        <header class="dashboard-header">
            <h2 style="margin: 0;">Özgür'ün <span style="color: var(--primary)">Dünyası</span></h2>
            <div style="display: flex; gap: 1rem; align-items: center;">
                <button id="logout-btn" class="primary-btn" style="padding: 0.5rem 1rem;">Merkezi Sisteme Dön</button>
            </div>
        </header>

        <div class="dashboard-content" style="text-align:center; padding-top:100px;">
            <h1 style="color:var(--primary); font-size:4rem; margin-bottom:1rem;">Hazırlanıyor...</h1>
            <p style="color:var(--text-secondary); font-size:1.5rem;">Yönetim ekranları doruklu-main altında toplandı.</p>
        </div>
    </div>

    <script type="module">
        import { initAuth } from './js/auth.js';
        document.addEventListener('DOMContentLoaded', initAuth);
    </script>
</body>
</html>
